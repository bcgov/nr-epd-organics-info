{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "frontend.fullname" . }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  strategy:
    type: {{ .Values.frontend.deploymentStrategy }}
    {{- if eq .Values.frontend.deploymentStrategy "RollingUpdate" }}
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    {{- end }}
  {{- if not .Values.frontend.autoscaling.enabled }}
  replicas: {{ .Values.frontend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '3003'
        prometheus.io/path: '/metrics'
        rollme: {{ randAlphaNum 5 | quote }}
      labels:
        {{- include "frontend.labels" . | nindent 8 }}
    spec:
      {{- if .Values.frontend.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.frontend.podSecurityContext | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ default 60 .Values.frontend.terminationGracePeriodSeconds }}
      containers:
        - name: {{ include "frontend.fullname" . }}
          {{- if .Values.frontend.securityContext }}
          securityContext:
            {{- toYaml .Values.frontend.securityContext | nindent 12 }}
          {{- end }}
          image: "{{.Values.global.registry}}/{{.Values.global.repository}}/frontend:{{ .Values.global.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ default "IfNotPresent" .Values.frontend.imagePullPolicy }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sleep", "5"]
          env:
            - name: BACKEND_URL
              value: "http://{{ .Release.Name }}-backend"
            - name: LOG_LEVEL
              value: "info"
            - name: VITE_AMS_URL
              value: {{ .Values.global.amsURL | quote }}
            - name: VITE_AMS_DOCS_FLAG
              value: {{ .Values.backend.env.omrrAuthzDocsFlag | quote }}
            - name: VITE_OSM_GRAYSCALE_FLAG
              value: {{ .Values.frontend.env.osmGrayscaleFlag | quote }}
            - name: VITE_ZOOM_TO_RESULTS_CONTROL_FLAG
              value: {{ .Values.frontend.env.zoomToResultsControlFlag | quote }}
            - name: VITE_NRPTI_API_URL
              value: {{ .Values.global.nrptiAPIURL | quote }}
            - name: VITE_NRCED_URL
              value: {{ .Values.global.nrcedURL | quote }}
            - name: VITE_HOW_TO_VIDEO_URL
              value: {{ .Values.frontend.env.howToVideoURL | quote }}
            # readOnlyRootFilesystem: true → redirect every writable path
            # onto an emptyDir. Caddy stores config/data under the XDG dirs
            # (mounted at /tmp/caddy); Coraza writes SecTmpDir/SecDataDir
            # under /tmp/coraza; generic temp files go to TMPDIR.
            - name: XDG_CONFIG_HOME
              value: /tmp/caddy
            - name: XDG_DATA_HOME
              value: /tmp/caddy
            - name: TMPDIR
              value: /tmp/caddy
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 2
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 30
          #-- the liveness probe for the container. it is optional and is an object. for default values check this link: https://github.com/bcgov/helm-service/blob/main/charts/component/templates/deployment.yaml#L324-L328
          livenessProbe:
            successThreshold: 1
            failureThreshold: 3
            httpGet:
              path: /health
              port: 3001
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.frontend.containerResources | nindent 12 }}
          volumeMounts:
            - name: caddy-data
              mountPath: /tmp/caddy
            - name: coraza-tmp
              mountPath: /tmp/coraza
      volumes:
        - name: caddy-data
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
        - name: coraza-tmp
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - {{ include "frontend.fullname" . }}
                  - key: app.kubernetes.io/instance
                    operator: In
                    values:
                      - {{ .Release.Name }}
              topologyKey: "kubernetes.io/hostname"

{{- end }}
